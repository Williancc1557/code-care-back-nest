services:
  auth-nest:
    image: node:22-alpine
    container_name: auth-nest-prod
    working_dir: /app
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      # Banco externo (não sobe banco neste compose)
      POSTGRES_URL: ${POSTGRES_URL:-postgresql://postgres:postgres@host.docker.internal:5432/auth_nest}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost:3001}
    ports:
      - "3000:3000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./:/app
      - auth_nest_node_modules:/app/node_modules
    command: sh -c "npm ci && npm run build && npm run start:prod"

volumes:
  auth_nest_node_modules:
