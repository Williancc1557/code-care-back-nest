services:
  auth-nest:
    build:
      context: .
      dockerfile: Dockerfile
    image: auth-nest:prod
    container_name: auth-nest-prod
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      # Banco externo (não sobe banco neste compose)
      POSTGRES_URL: ${POSTGRES_URL:-postgresql://postgres:postgres@host.docker.internal:5432/auth_nest}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost:3001}
    ports:
      - "3000:3000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - caddy-network
      - postgresql-network

networks:
  caddy-network:
    external: true
  postgresql-network:
    external: true